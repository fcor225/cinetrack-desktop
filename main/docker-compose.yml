# ═══════════════════════════════════════════════════════════════════
# CineTrack — Docker Compose (SQLite)
# Sin servicio externo de base de datos: SQLite va embebido.
#
# Uso:
#   docker-compose up --build        → Levantar todo
#   docker-compose logs -f backend   → Seguir logs del backend
#   docker-compose down              → Parar todo
# ═══════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────
  # CineTrack — Backend (API + Socket.IO + SQLite)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinetrack-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_PATH: /data/cinetrack.db
      JWT_SECRET: cinetrack_jwt_secret_cambiar_en_produccion
      JWT_EXPIRES_IN: 86400
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    restart: unless-stopped
    networks:
      - cinetrack-network
    volumes:
      - ./backend:/app
      - /app/node_modules
      # Montar la base de datos SQLite
      - ../database:/data

  # ─────────────────────────────────────────────
  # CineTrack — Frontend (React)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinetrack-web
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cinetrack-network

# ═══════════════════════════════════════════════
# Redes internas
# ═══════════════════════════════════════════════
networks:
  cinetrack-network:
    driver: bridge
    name: cinetrack-network
